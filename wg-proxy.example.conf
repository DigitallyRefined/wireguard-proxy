# wg-proxy.conf — WireGuard userspace forwarder
#
# Keys can be base64 (wg-quick standard) or 64-char hex.
# Generate with: wg genkey | tee privatekey | wg pubkey > publickey

[Interface]
PrivateKey = <your-private-key-base64>
Address    = 10.0.0.2
DNS        = 10.0.0.1
MTU        = 1420

[Peer]
PublicKey           = <server-public-key-base64>
Endpoint            = your.server.example.com:51820
AllowedIPs          = 10.0.0.0/24, 192.168.100.0/24
PersistentKeepalive = 25

# Forwarding rules
# proto  bind-addr    bind-port  remote-addr       remote-port
[Forward]
tcp      127.0.0.1    5432       10.0.0.1          5432
tcp      127.0.0.1    6379       10.0.0.1          6379
tcp      127.0.0.1    3306       10.0.0.1          3306
udp      127.0.0.1    5353       10.0.0.1          53

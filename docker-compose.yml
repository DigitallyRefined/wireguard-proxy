services:
  wg-proxy:
    image: ghcr.io/digitallyrefined/wireguard-proxy:v0.0.1
    container_name: wg-proxy
    restart: unless-stopped
    ports:
      - "51820:51820/udp"
      - "8080:8080"
    # environment:
    #   - DEBUG=true
    volumes:
      - ./wg-proxy.conf:/etc/wg-proxy/wg-proxy.conf
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
